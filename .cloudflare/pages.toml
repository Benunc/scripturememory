[build]
command = "npm ci && npm run build"
publish = "dist"
root_dir = "frontend"

[build.environment]
NODE_VERSION = "20"
NPM_FLAGS = "--legacy-peer-deps"

[build.trigger]
branch = "main"

[env.production]
name = "Production"
build.command = "npm ci && npm run build"
build.publish = "dist"
build.root_dir = "frontend"

[env.preview]
name = "Preview"
build.command = "npm ci && npm run build"
build.publish = "dist"
build.root_dir = "frontend" 